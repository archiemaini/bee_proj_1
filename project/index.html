<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <div class="header-container">
            <h1>Weather Forecast</h1>
            <img src="https://i.pinimg.com/originals/f5/f6/1a/f5f61ad8eae60541eae8c61182190db2.jpg" alt="Weather Icon" class="header-icon">
        </div>
        
     
        <div class="form-group">
            <label>Username:</label>
            <input type="text" id="username" placeholder="Type username here">
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" placeholder="Type password here">
        </div>
        
        <button id="loginButton">Log In</button>
        
   
        <p id="errorText"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
